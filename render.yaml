# render.yaml — зеркало текущего деплоя на Render.
#
# ВНИМАНИЕ: этот файл сейчас НЕ применяется как Blueprint. Сервис
# `valentin-bot-worker` (id: srv-cvhrontrie7s73e9tve0) и БД `superbot_db`
# (id: dpg-cvm4r2je5dus73afbbo0-a) были созданы вручную до перехода на
# Blueprints. Этот YAML существует как документация-зеркало: «вот что
# должно быть выкачено в продe». Любые изменения здесь нужно отражать
# в дашборде Render, и наоборот.
#
# Все админ-операции — через Render MCP, см. AGENTS.md §10.

services:
  - type: worker
    name: valentin-bot-worker
    runtime: python
    region: oregon
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: python -m src.main
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: superbot_db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OWNER_ID
        sync: false

databases:
  - name: superbot_db
    plan: basic-1gb
    region: oregon
    postgresMajorVersion: "16"
